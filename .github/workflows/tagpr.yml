name: tagpr

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  tagpr:
    name: Maintain release PR / tag
    runs-on: ubuntu-latest
    steps:
      # token: must be TAGPR_TOKEN (PAT), not the default GITHUB_TOKEN.
      # actions/checkout configures git credentials from this token; tagpr's
      # internal `git push origin vX.Y.Z` therefore uses the PAT, which
      # triggers release.yml. A push made with the built-in GITHUB_TOKEN would
      # NOT trigger other workflows (GitHub Actions loop-prevention).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ secrets.TAGPR_TOKEN }}

      # tagpr maintains a "release PR" that bumps the CHANGELOG and the next
      # version; merging that PR pushes the vX.Y.Z tag, which triggers release.yml.
      #
      # NOTE: a tag pushed using the default GITHUB_TOKEN does NOT trigger other
      # workflows. To let the pushed tag fire release.yml, tagpr must push with a
      # PAT (repo scope), provided via the TAGPR_TOKEN secret.
      - name: Check TAGPR_TOKEN secret
        env:
          TAGPR_TOKEN: ${{ secrets.TAGPR_TOKEN }}
        run: |
          if [ -z "${TAGPR_TOKEN}" ]; then
            echo "::error::TAGPR_TOKEN secret is not set. tagpr requires a PAT with repo scope to push tags that trigger release.yml. See the Maintainer note in README." >&2
            exit 1
          fi

      - uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1.20.0
        env:
          GITHUB_TOKEN: ${{ secrets.TAGPR_TOKEN }}
