name: Test

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # Unit tests: event parsing logic — no eBPF, no privileges needed
  # ---------------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev
          sudo apt-get install -y --no-install-recommends "linux-headers-$(uname -r)"
          ARCH=$(uname -m)
          case $ARCH in
            x86_64)  TRIPLET=x86_64-linux-gnu ;;
            aarch64) TRIPLET=aarch64-linux-gnu ;;
          esac
          sudo ln -sf /usr/include/${TRIPLET}/asm /usr/include/asm

      - name: Install bpf2go
        run: |
          EBPF_VERSION=$(go list -m -f '{{.Version}}' github.com/cilium/ebpf)
          go install github.com/cilium/ebpf/cmd/bpf2go@${EBPF_VERSION}

      - name: Generate eBPF bindings
        run: go generate ./internal/ebpf/...

      - name: Run unit tests
        run: go test -v -count=1 ./...

  # ---------------------------------------------------------------
  # Integration tests: actually loads eBPF and captures connections
  # ---------------------------------------------------------------
  integration:
    name: Integration tests (eBPF)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev
          sudo apt-get install -y --no-install-recommends "linux-headers-$(uname -r)"
          ARCH=$(uname -m)
          case $ARCH in
            x86_64)  TRIPLET=x86_64-linux-gnu ;;
            aarch64) TRIPLET=aarch64-linux-gnu ;;
          esac
          sudo ln -sf /usr/include/${TRIPLET}/asm /usr/include/asm

      - name: Install bpf2go
        run: |
          EBPF_VERSION=$(go list -m -f '{{.Version}}' github.com/cilium/ebpf)
          go install github.com/cilium/ebpf/cmd/bpf2go@${EBPF_VERSION}

      - name: Generate eBPF bindings
        run: go generate ./internal/ebpf/...

      - name: Run integration tests (with root for CAP_BPF)
        run: sudo env "PATH=$PATH" go test -v -count=1 -tags integration ./internal/ebpf/...
