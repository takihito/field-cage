name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 03:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: go
          queries: security-extended

      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev
          sudo apt-get install -y --no-install-recommends "linux-headers-$(uname -r)"
          ARCH=$(uname -m)
          case $ARCH in
            x86_64)  TRIPLET=x86_64-linux-gnu ;;
            aarch64) TRIPLET=aarch64-linux-gnu ;;
          esac
          sudo ln -sf /usr/include/${TRIPLET}/asm /usr/include/asm

      - name: Install bpf2go
        run: |
          EBPF_VERSION=$(go list -m -f '{{.Version}}' github.com/cilium/ebpf)
          go install github.com/cilium/ebpf/cmd/bpf2go@${EBPF_VERSION}

      - name: Generate eBPF bindings
        run: go generate ./internal/ebpf/...

      - name: Build
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:go"
