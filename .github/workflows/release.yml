name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  goreleaser:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # cosign keyless signing
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # GoReleaser needs full history/tags for changelog

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      # The GoReleaser before-hook runs `go generate`, which compiles the eBPF C
      # sources. Install the toolchain it needs (same as the test/smoke workflows).
      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev
          sudo apt-get install -y --no-install-recommends "linux-headers-$(uname -r)"
          ARCH=$(uname -m)
          case $ARCH in
            x86_64)  TRIPLET=x86_64-linux-gnu ;;
            aarch64) TRIPLET=aarch64-linux-gnu ;;
            *) echo "Unsupported architecture: $ARCH" >&2; exit 1 ;;
          esac
          sudo ln -sf "/usr/include/${TRIPLET}/asm" /usr/include/asm

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums with cosign (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Upload cosign signature and certificate to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload --clobber "${TAG}" \
            dist/checksums.txt.sig \
            dist/checksums.txt.pem

      - name: Generate base64-encoded subjects for SLSA
        id: hash
        run: |
          hashes=$(cat dist/checksums.txt | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

  provenance:
    needs: goreleaser
    permissions:
      actions: read
      id-token: write
      contents: write
    # slsa-github-generator must be called with a tag ref (not a SHA): the generator
    # embeds its own version into the provenance claims for self-identification.
    # This is an intentional exception to the project's SHA-pin policy.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.goreleaser.outputs.hashes }}"
      provenance-name: "checksums.txt.intoto.jsonl"
      upload-assets: true
