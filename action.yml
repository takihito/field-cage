name: "field-cage"
description: "eBPF-based outbound network monitor/restrictor for GitHub Actions runners (supply-chain defense)."
branding:
  icon: "shield"
  color: "blue"

inputs:
  version:
    description: "Release tag of field-cage to download (e.g. v0.1.0). Pin this to match the `uses:` ref."
    required: true
  config:
    description: "Path to the YAML policy file. Omit for audit mode with no policy (log-only)."
    required: false
    default: ""
  mode:
    description: "Enforcement mode: audit or block. Overrides the mode in the policy file."
    required: false
    default: ""
  allow:
    description: |
      Newline-separated list of allowed domains or IP addresses.
      Use this instead of a config file for simple inline allowlists.
      Cannot be combined with the `config` input.
      Example:
        allow: |
          github.com
          api.github.com
          registry.npmjs.org
    required: false
    default: ""
  log-file:
    description: "Path the agent writes its log to."
    required: false
    default: "/tmp/field-cage.log"

runs:
  using: composite
  steps:
    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Download and verify field-cage
      shell: bash
      env:
        FC_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        case "$(uname -m)" in
          x86_64)  ARCH=amd64 ;;
          aarch64) ARCH=arm64 ;;
          *) echo "field-cage: unsupported architecture: $(uname -m)" >&2; exit 1 ;;
        esac
        bin="field-cage_linux_${ARCH}"
        base="https://github.com/takihito/field-cage/releases/download/${FC_VERSION}"
        # Use RUNNER_TEMP (exec-safe on GitHub-hosted runners) when available;
        # fall back to /tmp for local testing.
        tmp="$(mktemp -d -p "${RUNNER_TEMP:-/tmp}")"
        # No EXIT trap: the binary in ${tmp} must survive until the
        # "Start field-cage agent" step. RUNNER_TEMP is cleaned up by
        # the runner at the end of the job.

        # Step 1: download checksums.txt and its cosign bundle.
        echo "field-cage: downloading checksums (${FC_VERSION})"
        curl -fsSL "${base}/checksums.txt"        -o "${tmp}/checksums.txt"
        curl -fsSL "${base}/checksums.txt.bundle" -o "${tmp}/checksums.txt.bundle"

        # Step 2: verify checksums.txt was signed by the release workflow.
        echo "field-cage: verifying cosign signature on checksums.txt"
        cosign verify-blob \
          --bundle "${tmp}/checksums.txt.bundle" \
          --certificate-identity "https://github.com/takihito/field-cage/.github/workflows/release.yml@refs/tags/${FC_VERSION}" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
          "${tmp}/checksums.txt"

        # Step 3: now that checksums.txt is trusted, download and verify the binary.
        echo "field-cage: downloading ${bin} (${FC_VERSION})"
        curl -fsSL "${base}/${bin}" -o "${tmp}/${bin}"
        ( cd "${tmp}" && grep " ${bin}\$" checksums.txt | sha256sum -c - )
        chmod +x "${tmp}/${bin}"
        echo "FC_BIN=${tmp}/${bin}" >> "$GITHUB_ENV"

    - name: Start field-cage agent
      shell: bash
      env:
        FC_CONFIG: ${{ inputs.config }}
        FC_ALLOW: ${{ inputs.allow }}
        FC_MODE: ${{ inputs.mode }}
        FC_LOG: ${{ inputs.log-file }}
      run: |
        set -euo pipefail

        # `allow` and `config` are mutually exclusive: using both at once is an error.
        if [ -n "${FC_ALLOW}" ] && [ -n "${FC_CONFIG}" ]; then
          echo "::error::Cannot use both 'allow' and 'config' inputs at the same time. Use one or the other." >&2
          exit 1
        fi
        if [ -n "${FC_ALLOW}" ]; then
          tmp_cfg="$(mktemp -p "${RUNNER_TEMP:-/tmp}" field-cage-policy-XXXXXX.yml)"
          {
            printf 'mode: %s\n' "${FC_MODE:-audit}"
            printf 'allowlist:\n'
            while IFS= read -r line; do
              # strip inline comments and surrounding whitespace (spaces and tabs)
              line="${line%%#*}"
              line="${line#"${line%%[![:space:]]*}"}"
              line="${line%"${line##*[![:space:]]}"}"
              [ -z "${line}" ] && continue
              # Single-quote each entry to prevent YAML injection from
              # caller-controlled values that contain metacharacters
              # (e.g. ": ", "[", "{"). A literal single-quote is escaped
              # as '' per the YAML single-quoted scalar spec.
              line="${line//\'/\'\'}"
              printf "  - '%s'\n" "${line}"
            done <<< "${FC_ALLOW}"
          } > "${tmp_cfg}"
          FC_CONFIG="${tmp_cfg}"
        fi

        args=()
        if [ -n "${FC_CONFIG}" ]; then args+=(--config "${FC_CONFIG}"); fi
        if [ -n "${FC_MODE}" ]; then args+=(--mode "${FC_MODE}"); fi
        echo "field-cage: starting agent (log: ${FC_LOG})"
        sudo nohup "${FC_BIN}" "${args[@]}" > "${FC_LOG}" 2>&1 &
        FC_PID=$!
        # Give the agent a moment to load its eBPF programs before later steps
        # generate traffic. The agent keeps running for the rest of the job.
        sleep 2
        # Fail fast if the agent exited during startup (wrong config, missing
        # eBPF capabilities, block-mode DNS capture failure, etc.).
        if ! sudo kill -0 "${FC_PID}" 2>/dev/null; then
          echo "::error::field-cage agent exited unexpectedly. Check the log below." >&2
          cat "${FC_LOG}" >&2 || true
          exit 1
        fi
        echo "field-cage: agent started (pid=${FC_PID})"
